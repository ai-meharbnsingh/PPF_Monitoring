# Local Development Docker Compose
# 
# This sets up a complete local development environment with:
# - PostgreSQL database
# - MQTT broker (Mosquitto)
# 
# Usage:
#   cd raspberrypi_config
#   docker-compose -f docker-compose.local.yml up -d
#
# Then start backend and frontend as described in DEPLOYMENT.md

version: '3.8'

services:
  # PostgreSQL Database for local development
  postgres:
    image: postgres:15-alpine
    container_name: ppf-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ppf_local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MQTT Broker for local development
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: ppf-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"    # MQTT
      - "9001:9001"    # WebSocket
    volumes:
      - mosquitto_config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    configs:
      - source: mosquitto_conf
        target: /mosquitto/config/mosquitto.conf
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-t", "health", "-m", "test", "-p", "1883", "-i", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Redis for caching/sessions (optional but recommended)
  redis:
    image: redis:7-alpine
    container_name: ppf-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Database Admin Tool (optional)
  adminer:
    image: adminer
    container_name: ppf-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
  mosquitto_config:
  mosquitto_data:
  mosquitto_log:
  redis_data:

configs:
  mosquitto_conf:
    content: |
      # Mosquitto configuration for local development
      # No authentication required for local development
      
      listener 1883
      allow_anonymous true
      
      listener 9001
      protocol websockets
      allow_anonymous true
      
      persistence true
      persistence_location /mosquitto/data/
      log_dest file /mosquitto/log/mosquitto.log
