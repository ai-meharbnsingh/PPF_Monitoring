name: Keep Render Backend Alive

# Ping the backend every 5 minutes to prevent Render free-tier spin-down.
# GitHub Actions cron minimum is every 5 minutes.
on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes, 24/7
  workflow_dispatch:          # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping /health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            https://ppf-backend-w0aq.onrender.com/health)

          echo "Response status: $STATUS"

          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "✅ Backend is alive (HTTP $STATUS)"
          elif [ "$STATUS" -eq 503 ]; then
            echo "⚠️  Backend degraded (HTTP 503) — MQTT or DB issue"
            exit 0   # don't fail — just inform
          else
            echo "❌ Backend returned HTTP $STATUS"
            exit 1
          fi
